<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linbin Pang - Resume</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: #fafafa;
      color: #111;
    }

    main {
      max-width: 32rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin: 0 0 0.75rem;
      font-weight: 700;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.5;
      margin: 0 0 2rem;
      color: #444;
    }

    .version {
      display: block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
      font-variant-numeric: tabular-nums;
    }

    .download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #111;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .download:hover {
      background: #000;
      transform: translateY(-1px);
    }

    .download:active {
      transform: translateY(0);
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #f5f5f5; }
      p { color: #bbb; }
      .download { background: #f5f5f5; color: #111; }
      .download:hover { background: #fff; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hi, my name is Linbin Pang</h1>
    <p>This is my resume.</p>
    <a class="download" href="resume.pdf" target="_blank" rel="noopener">
      Open PDF
    </a>
    <span class="version">v{{VERSION}}</span>
  </main>
</body>
</html>
